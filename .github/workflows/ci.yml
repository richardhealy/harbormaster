name: CI

on:
  push:
    branches: [main, "claude2/**", "release/**", "hotfix/**"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: harbormaster
          POSTGRES_PASSWORD: harbormaster
          POSTGRES_DB: harbormaster_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: postgres://harbormaster:harbormaster@localhost:5432/harbormaster_test
          NODE_ENV: test
